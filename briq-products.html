<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Briq — Order materials</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#009c41;--green-dark:#007a33;--green-pale:#eaf7f0;--green-mid:#b3e6c8;
  --white:#fff;--bg:#f4f7f5;--border:#e4ece8;--text:#16271d;--muted:#7a9e8a;--faint:#9bb3a6;
  --amber:#e8a53a;--amber-pale:#fef6e9;--blue:#3b82f6;--blue-pale:#eef4ff;
  --violet:#7c5cf0;--violet-pale:#f2eeff;--pink:#ec4899;--pink-pale:#fdeff6;
  --font:"Varela Round",sans-serif;--font2:"Nunito",sans-serif;
  --r:18px;--r-sm:12px;--ease:cubic-bezier(.4,0,.2,1);
  --sh:0 1px 2px rgba(16,40,28,.04),0 10px 30px rgba(16,40,28,.06);
  --sh-green:0 6px 18px rgba(0,156,65,.28);
  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;--s6:32px;
}
body{font-family:var(--font2);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{cursor:pointer;font-family:var(--font2);border:none;background:none}
svg{display:block}
.tnum{font-variant-numeric:tabular-nums}

.shell{display:flex;min-height:100vh}

/* sidebar */
.sidebar{width:224px;background:var(--white);border-right:1.5px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh}
.sb-logo{height:60px;padding:0 20px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:9px}
.dots{display:flex;gap:3px}.dots span{width:8px;height:8px;border-radius:50%}
.logo-name{font-weight:900;font-size:1.15rem;letter-spacing:-.02em}.logo-name em{font-style:normal;color:var(--green)}
.sb-user{padding:14px 18px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-av{width:34px;height:34px;border-radius:10px;background:var(--green);display:grid;place-items:center}
.sb-av svg{width:17px;height:17px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.sb-un{font-size:.84rem;font-weight:800}.sb-ur{font-size:.66rem;font-weight:700;color:var(--muted)}
.sb-nav{padding:12px 12px;display:flex;flex-direction:column;gap:3px}
.nsec{font-size:.58rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:8px 8px 5px}
.nitem{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--r-sm);border:1.5px solid transparent;transition:all .15s;width:100%;text-align:left}
.nitem:hover{background:var(--green-pale)}
.nitem.on{background:var(--green-pale);border-color:var(--green-mid)}
.nic{width:30px;height:30px;border-radius:8px;background:var(--bg);border:1.5px solid var(--border);display:grid;place-items:center;flex-shrink:0;transition:all .15s}
.nitem.on .nic{background:var(--green);border-color:var(--green-dark)}
.nic svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nitem.on .nic svg{stroke:#fff}
.nlbl{font-size:.8rem;font-weight:800;color:var(--muted)}.nitem.on .nlbl{color:var(--text)}
.nbadge{margin-left:auto;background:var(--green);color:#fff;font-size:.58rem;font-weight:900;padding:1px 7px;border-radius:100px}
.sb-panel{margin:14px 18px 0;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);padding:14px}
.sb-panel .pt{font-size:.82rem;font-weight:900;margin-bottom:6px}
.sb-panel .pn{font-size:.7rem;font-weight:600;color:var(--muted);line-height:1.5;margin-bottom:11px}
.sb-panel button{width:100%;height:36px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--white);font-size:.74rem;font-weight:800;color:var(--text);transition:all .15s}
.sb-panel button:hover{border-color:var(--green-mid);background:var(--green-pale);color:var(--green-dark)}
.sb-bottom{margin-top:auto;padding:14px 18px;border-top:1.5px solid var(--border);font-size:.66rem;font-weight:600;color:var(--muted);line-height:1.5}
.sb-bottom strong{color:var(--text)}

/* main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:60px;background:rgba(244,247,245,.85);backdrop-filter:blur(10px);border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 var(--s5);position:sticky;top:0;z-index:50;gap:12px}
.tb-l{display:flex;align-items:center;gap:12px;min-width:0}
.burger{display:none;padding:4px}.burger svg{width:22px;height:22px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round}
.tb-title{font-size:1.05rem;font-weight:900;letter-spacing:-.01em}
.tb-sub{font-size:.66rem;font-weight:600;color:var(--muted)}
.cart-btn{height:40px;padding:0 16px;border-radius:var(--r-sm);background:var(--green);color:#fff;font-weight:900;font-size:.82rem;display:inline-flex;align-items:center;gap:8px;box-shadow:var(--sh-green);transition:all .15s}
.cart-btn:hover{background:var(--green-dark);transform:translateY(-1px)}
.cart-btn svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.cart-btn.hide{display:none}

.content{padding:var(--s5);flex:1;max-width:1180px;width:100%;margin:0 auto}

/* search + filter (calm top) */
.searchbar{position:relative;margin-bottom:var(--s4)}
.searchbar svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:var(--muted);fill:none;stroke-width:1.8;stroke-linecap:round}
.searchbar input{width:100%;height:50px;border:1.5px solid var(--border);border-radius:14px;background:var(--white);padding:0 16px 0 44px;font-family:var(--font2);font-size:.92rem;font-weight:600;color:var(--text);outline:none;box-shadow:var(--sh);transition:border-color .15s}
.searchbar input:focus{border-color:var(--green)}
.searchbar input::placeholder{color:var(--faint)}

.filters{display:flex;gap:var(--s2);overflow-x:auto;padding-bottom:var(--s1);margin-bottom:var(--s5)}
.filters::-webkit-scrollbar{display:none}
.fchip{flex:none;height:36px;padding:0 15px;border-radius:100px;border:1.5px solid var(--border);background:var(--white);font-size:.78rem;font-weight:800;color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:7px}
.fchip:hover{border-color:var(--green-mid)}
.fchip.on{background:var(--text);color:#fff;border-color:var(--text)}
.fchip .fd{width:7px;height:7px;border-radius:50%}

/* packs strip (secondary) */
.sec-h{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:var(--s3)}
.sec-t{font-size:.78rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
.packs{display:flex;gap:var(--s3);overflow-x:auto;padding-bottom:var(--s1);margin-bottom:var(--s6)}
.packs::-webkit-scrollbar{display:none}
.pack{flex:none;display:flex;align-items:center;gap:11px;background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:11px 14px 11px 11px;transition:all .15s}
.pack:hover{border-color:var(--green-mid);transform:translateY(-1px);box-shadow:var(--sh)}
.pack .pi{width:36px;height:36px;border-radius:9px;background:var(--green-pale);border:1.5px solid var(--green-mid);display:grid;place-items:center;flex-shrink:0}
.pack .pi svg{width:16px;height:16px;stroke:var(--green-dark);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.pack b{font-size:.82rem;font-weight:900;display:block}
.pack span{font-size:.68rem;font-weight:700;color:var(--muted)}

/* PRODUCT GRID — the hero */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s4)}
.pcard{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;transition:transform .18s var(--ease),box-shadow .18s var(--ease),border-color .18s;display:flex;flex-direction:column}
.pcard:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(16,40,28,.1);border-color:var(--green-mid)}
.pmedia{position:relative;aspect-ratio:4/3;overflow:hidden}
.pmedia img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ph{position:absolute;inset:0;display:grid;place-items:center}
.ph svg{width:46px;height:46px;fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round;opacity:.5}
.tint-amber{background:linear-gradient(135deg,#fdf3e3,#f9e7c8)}.tint-amber .ph svg{stroke:var(--amber)}
.tint-blue{background:linear-gradient(135deg,#eef4ff,#d9e6ff)}.tint-blue .ph svg{stroke:var(--blue)}
.tint-green{background:linear-gradient(135deg,#e9f7ef,#cdebd9)}.tint-green .ph svg{stroke:var(--green)}
.tint-violet{background:linear-gradient(135deg,#f2eeff,#e2d9fb)}.tint-violet .ph svg{stroke:var(--violet)}
.tint-pink{background:linear-gradient(135deg,#fdeff6,#f9d6e8)}.tint-pink .ph svg{stroke:var(--pink)}
.seal{position:absolute;top:11px;right:11px;width:30px;height:30px;border-radius:50%;background:var(--green);display:grid;place-items:center;box-shadow:0 3px 10px rgba(0,156,65,.4);border:2px solid #fff}
.seal svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
.cat-tag{position:absolute;top:11px;left:11px;font-size:.6rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--text);background:rgba(255,255,255,.9);backdrop-filter:blur(4px);padding:4px 9px;border-radius:100px}
.pbody{padding:var(--s4);display:flex;flex-direction:column;flex:1}
.pname{font-size:1rem;font-weight:800;letter-spacing:-.01em;line-height:1.2}
.pspec{font-size:.72rem;font-weight:600;color:var(--muted);margin-top:3px}
.pprice{margin-top:var(--s3);display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.p-now{font-size:1.3rem;font-weight:900;letter-spacing:-.02em}
.p-was{font-size:.78rem;font-weight:700;color:var(--faint);text-decoration:line-through}
.p-unit{font-size:.7rem;font-weight:700;color:var(--muted)}
.save{display:inline-flex;align-items:center;gap:4px;margin-top:var(--s2);align-self:flex-start;font-size:.66rem;font-weight:800;color:var(--green-dark);background:var(--green-pale);border:1px solid var(--green-mid);padding:3px 9px;border-radius:100px}
.padd{margin-top:var(--s4)}
.add-full{width:100%;height:42px;border-radius:var(--r-sm);background:var(--text);color:#fff;font-weight:900;font-size:.84rem;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.add-full:hover{background:var(--green-dark)}
.add-full:active{transform:scale(.97)}
.add-full svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.stepper{display:flex;align-items:center;justify-content:space-between;height:42px;border:1.5px solid var(--green-mid);background:var(--green-pale);border-radius:var(--r-sm);overflow:hidden}
.stepper button{width:46px;height:100%;color:var(--green-dark);display:grid;place-items:center}
.stepper button:active{background:var(--green-mid)}
.stepper button svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.6;stroke-linecap:round}
.stepper .qn{font-weight:900;font-size:.95rem;color:var(--green-dark)}

/* review modal */
.modal-bg{position:fixed;inset:0;background:rgba(16,39,29,.55);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:var(--r);width:100%;max-width:460px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;transform:scale(.96) translateY(10px);transition:transform .22s;box-shadow:0 30px 60px rgba(0,0,0,.25)}
.modal-bg.open .modal{transform:none}
.mhead{padding:18px 22px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhead h3{font-family:var(--font);font-size:1.1rem}
.mx{font-size:1.4rem;color:var(--muted);padding:2px 8px;border-radius:8px}.mx:hover{background:var(--bg)}
.mbody{padding:18px 22px;overflow-y:auto}
.mline{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.mline .ln{font-size:.84rem;font-weight:700}.mline .lq{font-size:.7rem;font-weight:600;color:var(--muted);margin-top:2px}
.mline .lp{font-weight:900;white-space:nowrap}
.mtot{display:flex;justify-content:space-between;padding:6px 0;font-size:.82rem;font-weight:700;color:var(--muted)}
.mtot.sv{color:var(--green-dark);font-weight:800}
.mtot.grand{color:var(--text);font-size:1.2rem;font-family:var(--font);padding-top:12px;margin-top:6px;border-top:1.5px solid var(--border)}
.mnote{font-size:.7rem;font-weight:700;color:var(--muted);background:var(--green-pale);border:1px solid var(--green-mid);border-radius:10px;padding:9px 12px;margin-top:14px;display:flex;gap:8px;align-items:center}
.mnote svg{width:14px;height:14px;stroke:var(--green-dark);fill:none;stroke-width:2;flex-shrink:0}
.mbtn{width:100%;height:48px;border-radius:var(--r-sm);background:var(--green);color:#fff;font-weight:900;font-size:.92rem;box-shadow:var(--sh-green);margin-top:16px;transition:all .15s}
.mbtn:hover{background:var(--green-dark);transform:translateY(-1px)}

/* mobile bits */
.cart-bar{display:none;position:fixed;left:0;right:0;bottom:62px;z-index:60;padding:0 12px 8px}
.cart-bar .in{background:var(--green);color:#fff;border-radius:16px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 26px rgba(0,156,65,.4)}
.cart-bar b{font-size:1rem;font-weight:900}.cart-bar span{display:block;font-size:.66rem;font-weight:700;opacity:.9}
.cart-bar .go{font-weight:900;font-size:.84rem;display:flex;align-items:center;gap:6px}.cart-bar .go svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.4}
.bnav{display:none;position:fixed;left:0;right:0;bottom:0;z-index:65;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-top:1.5px solid var(--border);padding:6px 6px calc(6px + env(safe-area-inset-bottom))}
.bnav .row{display:flex}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--muted);font-weight:800;font-size:.62rem}
.bn.on{color:var(--green)}.bn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.overlay{display:none;position:fixed;inset:0;background:rgba(16,39,29,.5);z-index:300}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:#fff;padding:12px 20px;border-radius:12px;font-weight:800;font-size:.82rem;z-index:9999;opacity:0;transition:all .22s;box-shadow:0 8px 26px rgba(0,0,0,.25);pointer-events:none;border-left:3px solid var(--green)}
.toast.show{opacity:1;transform:translateX(-50%)}

@media(max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .sidebar{position:fixed;left:-280px;top:0;bottom:0;width:260px;z-index:400;transition:left .28s var(--ease)}
  .sidebar.open{left:0;box-shadow:6px 0 32px rgba(0,0,0,.18)}
  .overlay.show{display:block}
  .burger{display:block}.cart-btn{display:none}
  .content{padding:16px 14px 150px}.topbar{padding:0 14px}
  .cart-bar{display:block}.bnav{display:block}
}
@media(max-width:480px){
  .grid{gap:12px}.pbody{padding:13px}.p-now{font-size:1.15rem}.pname{font-size:.9rem}
  .modal-bg{align-items:flex-end;padding:0}.modal{max-width:100%;border-radius:18px 18px 0 0;max-height:92vh}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo"><span class="dots"><span style="background:#009c41"></span><span style="background:#3b82f6"></span><span style="background:#e8a53a"></span></span><span class="logo-name">Bri<em>q</em></span></div>
    <div class="sb-user"><div class="sb-av"><svg viewBox="0 0 24 24"><path d="M3 21l9-16 9 16z"/><path d="M8 21l4-7 4 7"/></svg></div><div><div class="sb-un">Briq</div><div class="sb-ur">Jinja, Uganda</div></div></div>
    <nav class="sb-nav">
      <div class="nsec">Browse</div>
      <button class="nitem on"><span class="nic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span><span class="nlbl">Order materials</span><span class="nbadge" id="navCount" style="display:none"></span></button>
      <button class="nitem"><span class="nic"><svg viewBox="0 0 24 24"><path d="M5 3h14v18l-2.5-1.6L14 21l-2-1.6L10 21l-2.5-1.6L5 21z"/><path d="M9 8h6M9 12h5"/></svg></span><span class="nlbl">My orders</span></button>
      <button class="nitem"><span class="nic"><svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6z"/><path d="M9 12l2 2 4-4"/></svg></span><span class="nlbl">Why Briq</span></button>
    </nav>
    <div class="sb-panel"><div class="pt">Project</div><div class="pn">No project yet. Add one to group your orders by site.</div><button>+ New project</button></div>
    <div class="sb-bottom"><strong>Engineer-verified</strong> materials, sourced, checked and delivered to your site.</div>
  </aside>
  <div class="overlay" id="overlay" onclick="closeSide()"></div>

  <div class="main">
    <header class="topbar">
      <div class="tb-l">
        <button class="burger" onclick="openSide()"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div><div class="tb-title">Order materials</div><div class="tb-sub">Briq · Jinja</div></div>
      </div>
      <button class="cart-btn hide" id="cartTop" onclick="openReview()"></button>
    </header>

    <main class="content">
      <div class="searchbar"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input placeholder="Search cement, Y12, blocks, ballast…" oninput="setSearch(this.value)"></div>
      <div class="filters" id="filters"></div>

      <div class="sec-h"><span class="sec-t">Quick packs</span></div>
      <div class="packs" id="packs"></div>

      <div class="sec-h"><span class="sec-t" id="gridTitle">All materials</span><span class="sec-t tnum" id="gridCount"></span></div>
      <div class="grid" id="grid"></div>
    </main>
  </div>
</div>

<div class="cart-bar" id="cartBar"></div>
<nav class="bnav"><div class="row">
  <button class="bn on"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Materials</button>
  <button class="bn"><svg viewBox="0 0 24 24"><path d="M5 3h14v18l-2.5-1.6L14 21l-2-1.6L10 21l-2.5-1.6L5 21z"/><path d="M9 8h6M9 12h5"/></svg>Orders</button>
  <button class="bn"><svg viewBox="0 0 24 24"><path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6z"/><path d="M9 12l2 2 4-4"/></svg>Why Briq</button>
</div></nav>

<div class="modal-bg" id="modal"><div class="modal" id="modalCard"></div></div>
<div class="toast" id="toast"></div>

<script>
const FEE=0.06;
const ICON={cement:'<path d="M6 8l1-3h10l1 3"/><rect x="5" y="8" width="14" height="12" rx="2"/><path d="M9 13h6"/>',steel:'<path d="M4 7h16M4 12h16M4 17h16"/>',block:'<rect x="3" y="6" width="18" height="12" rx="1.5"/><path d="M9 6v12M15 6v12"/>',aggregate:'<circle cx="8" cy="9" r="2.4"/><circle cx="15" cy="11" r="2.4"/><circle cx="11" cy="16" r="2.4"/>',roof:'<path d="M3 11l9-6 9 6"/><path d="M5 10v9h14v-9"/>'};
const GMETA={Cement:{t:"amber",i:"cement"},Steel:{t:"blue",i:"steel"},Blocks:{t:"green",i:"block"},Aggregates:{t:"violet",i:"aggregate"},Roofing:{t:"pink",i:"roof"}};
function sv(n,s){return`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="${s||16}" height="${s||16}">${n}</svg>`}
const CHECK='<path d="M5 12l4.5 4.5L19 7"/>',PLUS='<path d="M12 5v14M5 12h14"/>',MINUS='<path d="M5 12h14"/>',CART='<path d="M4 5h2l2 11h9l2-7H7"/><circle cx="9" cy="20" r="1.4"/><circle cx="17" cy="20" r="1.4"/>',SPARK='<path d="M12 3l2.2 5.6L20 11l-5.8 2.4L12 19l-2.2-5.6L4 11l5.8-2.4z"/>';

const MAT=[
  ["cem-hima","Cement — Hima","50kg · OPC 42.5N","Cement","bag",38000,44000,1],
  ["cem-tororo","Cement — Tororo","50kg · OPC 42.5N","Cement","bag",36000,42000,1],
  ["bar-y12","Iron bar Y12","12mm deformed · 12m","Steel","length",38000,44000,1],
  ["bar-y10","Iron bar Y10","10mm deformed · 12m","Steel","length",27000,32000,1],
  ["bar-y16","Iron bar Y16","16mm deformed · 12m","Steel","length",68000,78000,1],
  ["brc","BRC mesh A142","Standard sheet","Steel","sheet",95000,110000,1],
  ["block-9",'Hollow block 9"',"Vibrated · 400×200×225","Blocks","block",3000,3500,1],
  ["block-6",'Hollow block 6"',"Vibrated · 400×200×150","Blocks","block",2200,2600,1],
  ["ballast","Aggregate / ballast",'3/4" stone · per tonne',"Aggregates","tonne",75000,88000,1],
  ["sand-river","River sand","Concrete sand · per tonne","Aggregates","tonne",45000,53000,0],
  ["sand-lake","Plaster sand","Fine lake sand · per tonne","Aggregates","tonne",60000,70000,0],
  ["hardcore","Hardcore","Foundation fill · per tonne","Aggregates","tonne",35000,41000,0],
  ["sheet-28","Iron sheets G28","Box profile · 3m","Roofing","sheet",38000,45000,0],
  ["nails","Nails","Assorted · per kg","Roofing","kg",6000,7200,0],
  ["wire","Binding wire","Galvanised · per kg","Steel","kg",6500,7800,0],
].map(([id,name,spec,group,unit,supplier,retail,v])=>{const brik=Math.round(supplier*(1+FEE));return{id,name,spec,group,unit,supplier,retail,verified:!!v,brik,save:retail-brik}});
const PACKS=[["Foundation","Strip footing"],["Slab","Suspended floor"],["Walling","Block work"],["Roofing","Iron sheet cover"]];
const CATS=["All","Cement","Steel","Blocks","Aggregates","Roofing"];
const DOT={Cement:"var(--amber)",Steel:"var(--blue)",Blocks:"var(--green)",Aggregates:"var(--violet)",Roofing:"var(--pink)"};

let cart={},cat="All",q="";
const fmt=n=>"UGX "+Math.round(n).toLocaleString("en-UG"),shh=n=>Math.round(n).toLocaleString("en-UG");
const M=id=>MAT.find(m=>m.id===id);
const lines=()=>Object.entries(cart).map(([id,n])=>{const m=M(id);return{...m,qty:n,lt:m.brik*n,ls:m.save*n}});
const grand=()=>lines().reduce((s,l)=>s+l.lt,0),supTot=()=>lines().reduce((s,l)=>s+l.supplier*l.qty,0),saveTot=()=>lines().reduce((s,l)=>s+l.ls,0),count=()=>lines().reduce((s,l)=>s+l.qty,0);

function setCat(c){cat=c;render()}
function setSearch(v){q=v.toLowerCase();render()}
function bump(id,d){const n=Math.max(0,(cart[id]||0)+d);if(n===0)delete cart[id];else cart[id]=n;render()}
function addPack(){toast("Pack added to cart");["cem-hima","ballast","bar-y12"].forEach(id=>cart[id]=(cart[id]||0)+5);render()}
function openSide(){sidebar.classList.add("open");overlay.classList.add("show")}
function closeSide(){sidebar.classList.remove("open");overlay.classList.remove("show")}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200)}
function openReview(){if(!count())return;renderModal();modal.classList.add("open")}
function closeReview(){modal.classList.remove("open")}
function place(){cart={};closeReview();toast("Order placed · we'll confirm your slot");render()}

function render(){
  // filters
  document.getElementById("filters").innerHTML=CATS.map(c=>{
    const dot=c!=="All"?`<span class="fd" style="background:${DOT[c]}"></span>`:"";
    return `<button class="fchip ${cat===c?"on":""}" onclick="setCat('${c}')">${dot}${c}</button>`;
  }).join("");
  // packs
  document.getElementById("packs").innerHTML=PACKS.map(([n,s])=>`<button class="pack" onclick="addPack()"><span class="pi">${sv(SPARK,16)}</span><span><b>${n}</b><span>${s}</span></span></button>`).join("");
  // grid
  let list=MAT.filter(m=>(cat==="All"||m.group===cat)&&(!q||m.name.toLowerCase().includes(q)||m.spec.toLowerCase().includes(q)));
  document.getElementById("gridTitle").textContent=cat==="All"?"All materials":cat;
  document.getElementById("gridCount").textContent=list.length+" item"+(list.length!==1?"s":"");
  document.getElementById("grid").innerHTML=list.map(m=>{
    const mt=GMETA[m.group],n=cart[m.id]||0;
    const ctrl=n===0
      ?`<button class="add-full" onclick="bump('${m.id}',1)">${sv(PLUS,16)} Add to order</button>`
      :`<div class="stepper"><button onclick="bump('${m.id}',-1)">${sv(MINUS,16)}</button><span class="qn tnum">${n}</span><button onclick="bump('${m.id}',1)">${sv(PLUS,16)}</button></div>`;
    return `<div class="pcard"><div class="pmedia tint-${mt.t}">
      <div class="ph">${sv(ICON[mt.i],46)}</div>
      <img src="images/${m.id}.jpg" alt="${m.name}" onerror="this.style.display='none'">
      <span class="cat-tag">${m.group}</span>
      ${m.verified?`<span class="seal" title="Engineer-verified">${sv(CHECK,15)}</span>`:""}
    </div>
    <div class="pbody"><div class="pname">${m.name}</div><div class="pspec">${m.spec}</div>
      <div class="pprice"><span class="p-now tnum">${fmt(m.brik)}</span><span class="p-was tnum">${shh(m.retail)}</span><span class="p-unit">/ ${m.unit}</span></div>
      <span class="save">${sv(CHECK,11)} Save ${shh(m.save)} vs retail</span>
      <div class="padd">${ctrl}</div>
    </div></div>`;
  }).join("");
  // cart surfaces
  const ct=document.getElementById("cartTop");
  if(count()){ct.classList.remove("hide");ct.innerHTML=`${sv(CART,15)} ${fmt(grand())} · ${count()}`}else ct.classList.add("hide");
  const nb=document.getElementById("navCount");if(count()){nb.style.display="inline-block";nb.textContent=count()}else nb.style.display="none";
  document.getElementById("cartBar").innerHTML=count()?`<div class="in" onclick="openReview()"><div><b class="tnum">${fmt(grand())}</b><span>${count()} item${count()>1?"s":""} · save ${fmt(saveTot())}</span></div><div class="go">Review ${sv(CHECK,15)}</div></div>`:"";
}

function renderModal(){
  const ls=lines().map(l=>`<div class="mline"><div><div class="ln">${l.name}</div><div class="lq tnum">${l.qty} × ${fmt(l.brik)} / ${l.unit}</div></div><div class="lp tnum">${fmt(l.lt)}</div></div>`).join("");
  document.getElementById("modalCard").innerHTML=`<div class="mhead"><h3>Review order</h3><button class="mx" onclick="closeReview()">×</button></div>
  <div class="mbody">${ls}
    <div style="margin-top:8px"><div class="mtot"><span>Supplier cost</span><span class="tnum">${fmt(supTot())}</span></div>
    <div class="mtot"><span>Briq fee (6%)</span><span class="tnum">${fmt(grand()-supTot())}</span></div>
    <div class="mtot sv"><span>You save vs retail</span><span class="tnum">${fmt(saveTot())}</span></div>
    <div class="mtot grand"><span>Total</span><span class="tnum">${fmt(grand())}</span></div></div>
    <div class="mnote">${sv(CHECK,14)} Every line is engineer-verified. Wrong spec or it fails — replaced free.</div>
    <button class="mbtn" onclick="place()">Place order · pay on delivery</button></div>`;
}
render();
</script>
</body>
</html>
