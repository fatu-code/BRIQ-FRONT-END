<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Briq — materials, verified, delivered</title>
<meta name="description" content="Order engineer-verified construction materials — cement, steel, blocks, aggregates, roofing — sourced, quality-checked and delivered to your site in Uganda. Transparent pricing, pay on delivery.">
<meta property="og:title" content="Briq — materials, verified, delivered">
<meta property="og:description" content="Engineer-verified construction materials, sourced, checked and delivered to site. Transparent pricing, pay on delivery.">
<meta property="og:type" content="website">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23009c41'/%3E%3Cpath d='M16 6l8 14H8z' fill='none' stroke='white' stroke-width='2.4' stroke-linejoin='round'/%3E%3C/svg%3E">
<meta name="theme-color" content="#009c41">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Briq">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<a class="skip-link" href="#content">Skip to materials</a>
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <span class="logo-dots"><span style="background:#009c41"></span><span style="background:#3b82f6"></span><span style="background:#e8a53a"></span></span>
      <span class="logo-name">Bri<em>q</em></span>
    </div>
    <div class="sb-user">
      <div class="sb-avatar"><svg viewBox="0 0 24 24"><path d="M3 21l9-16 9 16z"/><path d="M8 21l4-7 4 7"/></svg></div>
      <div><div class="sb-user-name">Briq</div><div class="sb-user-role">Jinja, Uganda</div></div>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sidebar-panel" id="projPanel"></div>
    <div class="sb-bottom"><div class="sb-bottom-text"><strong>Engineer-verified</strong> materials, sourced, checked and delivered to your site.</div></div>
  </aside>
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- MAIN -->
  <div class="main-area">
    <header class="topbar">
      <div class="topbar-l">
        <button class="mob-sidebar-btn" onclick="openSidebar()" aria-label="Open menu" aria-controls="sidebar" aria-expanded="false"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div><h1 class="topbar-title" id="tbTitle">Order materials</h1><div class="topbar-sub" id="tbSub">Briq · Jinja</div></div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-green cart-top" id="cartTop" onclick="openReview()" style="display:none"></button>
      </div>
    </header>

    <main class="content" id="content" tabindex="-1"></main>
  </div>
</div>

<!-- MOBILE STICKY CART -->
<div class="cart-bar" id="cartBar"></div>

<!-- MOBILE BOTTOM NAV -->
<nav class="bottom-nav" id="bottomNav"></nav>

<!-- REVIEW MODAL -->
<div class="modal-bg" id="reviewModal" onclick="if(event.target===this)closeReview()"><div class="modal-card" id="reviewCard" role="dialog" aria-modal="true" aria-labelledby="reviewTitle"></div></div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<noscript><div style="max-width:520px;margin:64px auto;padding:0 24px;font-family:Nunito,sans-serif;text-align:center;color:#1a2e22"><h1 style="color:#009c41">Briq</h1><p>Briq needs JavaScript to order materials. Please enable it, or call us to place your order.</p></div></noscript>

<script src="config.js"></script>
<script src="app.js"></script>
<script>if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));</script>
</body>
</html>
