<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<meta property="og:title" content="Briq - materials, verified, delivered">
<meta property="og:description" content="Engineer-verified construction materials, sourced, checked and delivered to site. Transparent pricing, pay on delivery.">
<meta property="og:type" content="website">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23009c41'/%3E%3Cg fill='none' stroke='white' stroke-width='2' stroke-linecap='round'%3E%3Cpath d='M8 9h16M8 16h16M8 23h16'/%3E%3Cpath d='M16 9v7'/%3E%3Cpath d='M12 16v7M20 16v7'/%3E%3C/g%3E%3C/svg%3E">
<meta name="theme-color" content="#009c41">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Briq">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<a class="skip-link" href="#content">Skip to products</a>
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <span class="logo-mark" aria-hidden="true"><svg viewBox="0 0 32 32"><defs><linearGradient id="lmg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#009C41"/><stop offset="1" stop-color="#004D1E"/></linearGradient></defs><rect width="32" height="32" rx="9" fill="url(#lmg)"/><g fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9h16M8 16h16M8 23h16"/><path d="M16 9v7"/><path d="M12 16v7M20 16v7"/></g></svg></span>
      <span class="logo-name">briq</span>
    </div>
    <button class="sb-user" id="sbUser" onclick="openProfile()" aria-label="Your profile"></button>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-bottom">
      <span class="sb-verify-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6z"/><path d="M9 12l2 2 4-4"/></svg></span>
      <div><div class="sb-verify-h">Engineer-verified</div><div class="sb-verify-p">Materials and equipment, vetted by Briq.</div></div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- MAIN -->
  <div class="main-area">
    <header class="topbar">
      <div class="topbar-l">
        <button class="mob-sidebar-btn" onclick="openSidebar()" aria-label="Open menu" aria-controls="sidebar" aria-expanded="false"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div><h1 class="topbar-title" id="tbTitle">Order materials</h1><div class="topbar-sub" id="tbSub">Briq · Jinja</div></div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-green cart-top" id="cartTop" onclick="openReview()" style="display:none"></button>
      </div>
    </header>

    <main class="content" id="content" tabindex="-1"></main>
  </div>
</div>

<!-- MOBILE STICKY CART -->
<div class="cart-bar" id="cartBar"></div>

<!-- MOBILE BOTTOM NAV -->
<nav class="bottom-nav" id="bottomNav"></nav>

<!-- REVIEW MODAL -->
<div class="modal-bg" id="reviewModal" onclick="if(event.target===this)closeReview()"><div class="modal-card" id="reviewCard" role="dialog" aria-modal="true" aria-labelledby="reviewTitle"></div></div>

<!-- PROFILE MODAL -->
<div class="modal-bg" id="profileModal" onclick="if(event.target===this)closeProfile()"><div class="modal-card" id="profileCard" role="dialog" aria-modal="true" aria-labelledby="profileTitle"></div></div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<noscript><div style="max-width:520px;margin:64px auto;padding:0 24px;font-family:Nunito,sans-serif;text-align:center;color:#1a2e22"><h1 style="color:#009c41">Briq</h1><p>Briq needs JavaScript to order materials. Please enable it, or call us to place your order.</p></div></noscript>

<script src="config.js"></script>
<script src="app.js"></script>
<script>if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));</script>
</body>
</html>
